server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy interno hacia ddaa-service. En Docker Compose y Kubernetes el nombre
    # ddaa-service se resuelve por DNS interno de la red/cluster.
    location /api/ {
        proxy_pass http://ddaa-service:8082/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator/ {
        proxy_pass http://ddaa-service:8082/actuator/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri /index.html;
    }
}
